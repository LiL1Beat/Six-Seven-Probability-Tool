<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Six-Seven Probability Tools</title>

    <!-- Google Fonts (Kanit for Thai-friendly UI + Orbitron for headings) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=Orbitron:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Font Awesome for icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      integrity="sha512-p8fXQm6k6+T1V0q3GZ6qQb1+2x3J2b1c1qVqQzJZcX1s6bN1m5qK0Yx1Q1v3gQ1W0Q1V1a1z1"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <style>
      :root {
        --bg: #0b1020; /* deep navy */
        --card: #0f1724;
        --accent: #7c3aed; /* violet */
        --accent-2: #06b6d4; /* cyan */
        --muted: #9aa4b2;
        --glass: rgba(255, 255, 255, 0.04);
        --glass-2: rgba(255, 255, 255, 0.02);
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        background: linear-gradient(180deg, var(--bg), #071022 120%);
        color: #e6eef8;
        font-family: "Kanit", system-ui, Segoe UI, Roboto, "Helvetica Neue",
          Arial;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        padding: 28px;
        box-sizing: border-box;
      }

      .app {
        max-width: 1100px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: 1fr 360px;
        gap: 24px;
      }

      header {
        grid-column: 1/-1;
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .logo {
        width: 64px;
        height: 64px;
        border-radius: 12px;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 6px 24px rgba(0, 0, 0, 0.6);
      }
      .logo i {
        font-size: 28px;
        color: white;
      }
      h1 {
        font-family: "Orbitron", sans-serif;
        margin: 0;
        font-size: 20px;
        letter-spacing: 0.6px;
      }
      p.lead {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
      }

      /* left column cards */
      .card {
        background: linear-gradient(180deg, var(--card), #071026);
        border-radius: 14px;
        padding: 18px;
        box-shadow: 0 6px 30px rgba(7, 10, 20, 0.6);
      }

      /* tabs */
      .tabs {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }
      .tab {
        flex: 1;
        text-align: center;
        padding: 10px 12px;
        border-radius: 10px;
        cursor: pointer;
        font-weight: 600;
        color: var(--muted);
        background: var(--glass-2);
      }
      .tab.active {
        background: linear-gradient(
          90deg,
          rgba(124, 58, 237, 0.14),
          rgba(6, 182, 212, 0.06)
        );
        color: white;
        box-shadow: 0 6px 18px rgba(6, 182, 212, 0.04);
      }

      /* control row */
      .row {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-top: 12px;
      }
      input[type="number"],
      select {
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.06);
        padding: 8px 10px;
        border-radius: 8px;
        color: inherit;
      }
      button.btn {
        background: linear-gradient(90deg, var(--accent), var(--accent-2));
        border: none;
        color: white;
        padding: 10px 14px;
        border-radius: 10px;
        font-weight: 700;
        cursor: pointer;
      }
      button.ghost {
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.06);
        color: var(--muted);
      }

      /* result area */
      .result-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-top: 16px;
      }
      .result-item {
        padding: 12px;
        border-radius: 10px;
        background: var(--glass);
        min-height: 120px;
      }

      /* right column */
      .meta {
        position: sticky;
        top: 28px;
      }
      .meta .small {
        font-size: 13px;
        color: var(--muted);
      }

      /* list and table */
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 8px;
      }
      table td,
      table th {
        padding: 6px 8px;
        text-align: left;
        font-size: 13px;
      }
      .chart-wrap {
        height: 220px;
      }

      /* animations */
      .spinner {
        width: 46px;
        height: 46px;
        border-radius: 8px;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: 800;
      }
      .dice-anim {
        width: 46px;
        height: 46px;
        display: inline-grid;
        place-items: center;
        border-radius: 8px;
        font-weight: 800;
        background: linear-gradient(135deg, #111827, #0b1220);
        animation: shake 0.6s ease-in-out both;
      }
      @keyframes shake {
        0% {
          transform: rotate(0);
        }
        20% {
          transform: rotate(10deg);
        }
        50% {
          transform: rotate(-8deg);
        }
        80% {
          transform: rotate(6deg);
        }
        100% {
          transform: rotate(0);
        }
      }

      /* responsive */
      @media (max-width: 980px) {
        .app {
          grid-template-columns: 1fr;
          padding-bottom: 64px;
        }
        .meta {
          position: relative;
          top: auto;
        }
      }

      /* little footer */
      footer {
        grid-column: 1/-1;
        margin-top: 18px;
        color: var(--muted);
        font-size: 13px;
        text-align: center;
      }

      .pill {
        background: rgba(255, 255, 255, 0.03);
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 13px;
      }

      .item-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .item-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px;
        border-radius: 8px;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.01),
          transparent
        );
      }

      .big-num {
        font-size: 22px;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header>
        <div class="logo">
        </div>
        <div>
          <h1>Six - Seven Probability Tools</h1>
          <p class="lead">by ชัยวุฒิ อกอุ่น เลขที่ 7 ม.5/1</p>
        </div>
        <div style="margin-left: auto" class="pill">
          67
        </div>
      </header>

      <!-- left column -->
      <main>
        <div class="card">
          <div
            style="
              display: flex;
              align-items: center;
              justify-content: space-between;
              gap: 12px;
            "
          >
            <div>
              <div style="font-size: 13px; color: var(--muted)">Tools</div>
              <div style="display: flex; gap: 8px; margin-top: 8px">
                <div id="tab-dice" class="tab active">🎲 Dice Simulator</div>
                <div id="tab-gacha" class="tab">🎰 Gacha</div>
                <div id="tab-combo" class="tab">∑ nCr / nPr</div>
              </div>
            </div>
            <div
              style="text-align: right; color: var(--muted); font-size: 13px"
            >
              <div>Real time answer</div>
              <div style="margin-top: 6px">
                Export: <button class="ghost" id="exportCSV">CSV</button>
              </div>
            </div>
          </div>

          <!-- DICE -->
          <section id="pane-dice" style="margin-top: 14px">
            <div class="row">
              <label>จำนวนครั้ง</label>
              <input id="dice-rolls" type="number" min="1" value="500" />
              <label>หน้า</label>
              <select id="dice-sides">
                <option>6</option>
                <option>4</option>
                <option>8</option>
                <option>10</option>
                <option>12</option>
              </select>
              <button class="btn" id="dice-sim">Simulate</button>
              <button class="ghost" id="dice-random">Quick 100</button>
            </div>

            <div class="result-grid">
              <div class="result-item">
                <div
                  style="
                    display: flex;
                    align-items: center;
                    justify-content: space-between;
                  "
                >
                  <div>
                    <div style="font-size: 13px; color: var(--muted)">สรุป</div>
                    <div id="dice-summary" class="big-num">ยังไม่ทำการสุ่ม</div>
                  </div>
                  <div id="dice-preview" class="dice-anim">—</div>
                </div>
                <div style="margin-top: 8px" id="dice-table-wrap"></div>
              </div>

              <div class="result-item">
                <div style="font-size: 13px; color: var(--muted)">Chart</div>
                <div class="chart-wrap"><canvas id="dice-chart"></canvas></div>
              </div>
            </div>
          </section>

          <!-- GACHA -->
          <section id="pane-gacha" style="display: none; margin-top: 14px">
            <div style="font-size: 13px; color: var(--muted)">
              ตั้งค่าจำนวนครั้งที่สุ่ม
            </div>
            <div
              style="
                display: flex;
                gap: 8px;
                margin-top: 8px;
                align-items: center;
              "
            >
              <input id="gacha-pulls" type="number" min="1" value="100" />
              <button class="btn" id="gacha-sim">Pull</button>
              <button class="ghost" id="gacha-reset">Reset</button>
            </div>

            <div style="display: flex; gap: 12px; margin-top: 12px">
              <div style="flex: 1">
                <div class="item-list card" style="padding: 10px">
                  <div class="item-row">
                    <div>SSR <small style="color: var(--muted)">5%</small></div>
                    <input
                      id="gacha-ssr"
                      type="number"
                      min="0"
                      value="5"
                      style="width: 70px"
                    />
                  </div>
                  <div class="item-row">
                    <div>SR <small style="color: var(--muted)">20%</small></div>
                    <input
                      id="gacha-sr"
                      type="number"
                      min="0"
                      value="20"
                      style="width: 70px"
                    />
                  </div>
                  <div class="item-row">
                    <div>R <small style="color: var(--muted)">75%</small></div>
                    <input
                      id="gacha-r"
                      type="number"
                      min="0"
                      value="75"
                      style="width: 70px"
                    />
                  </div>
                </div>
              </div>
              <div style="flex: 1">
                <div style="font-size: 13px; color: var(--muted)">ผลลัพธ์</div>
                <div
                  id="gacha-result-list"
                  class="card"
                  style="margin-top: 8px; min-height: 160px; padding: 12px"
                >
                  ยังไม่สุ่ม
                </div>
              </div>
            </div>

            <div style="margin-top: 12px" class="result-item">
              <div style="font-size: 13px; color: var(--muted)">Chart</div>
              <div class="chart-wrap"><canvas id="gacha-chart"></canvas></div>
            </div>
          </section>

          <!-- COMBINATORICS -->
          <section id="pane-combo" style="display: none; margin-top: 14px">
            <div style="display: flex; gap: 8px; align-items: center">
              <input id="combo-n" type="number" min="0" value="10" />
              <div style="color: var(--muted)">Choose k</div>
              <input id="combo-k" type="number" min="0" value="3" />
              <select id="combo-mode">
                <option value="nCr">nCr (Combination)</option>
                <option value="nPr">nPr (Permutation)</option>
              </select>
              <button class="btn" id="combo-calc">Calculate</button>
            </div>

            <div style="margin-top: 12px" class="result-item">
              <div style="font-size: 13px; color: var(--muted)">ผลลัพธ์</div>
              <div
                id="combo-result"
                style="margin-top: 8px; font-weight: 800; font-size: 18px"
              >
                —
              </div>
              <div
                style="margin-top: 8px; color: var(--muted); font-size: 13px"
                id="combo-explain"
              ></div>
            </div>
          </section>
        </div>

        

    <script>
      // ---- Utilities ----
      const qs = (s) => document.querySelector(s);
      const qsa = (s) => document.querySelectorAll(s);

      // ---- Tabs ----
      const tabs = [
        { id: "tab-dice", pane: "pane-dice" },
        { id: "tab-gacha", pane: "pane-gacha" },
        { id: "tab-combo", pane: "pane-combo" },
      ];
      tabs.forEach((t) => {
        qs("#" + t.id).addEventListener("click", () => {
          tabs.forEach((x) => {
            qs("#" + x.id).classList.remove("active");
            qs("#" + x.pane).style.display = "none";
          });
          qs("#" + t.id).classList.add("active");
          qs("#" + t.pane).style.display = "block";
        });
      });

      // ---- DICE SIMULATOR ----
      let diceChart = null;
      function initDiceChart(labels, data) {
        const ctx = qs("#dice-chart");
        if (diceChart) diceChart.destroy();
        diceChart = new Chart(ctx, {
          type: "bar",
          data: {
            labels,
            datasets: [
              { label: "Counts", data, borderRadius: 6, tension: 0.3 },
            ],
          },
          options: {
            scales: { y: { beginAtZero: true } },
            plugins: { legend: { display: false } },
          },
        });
      }

      function rollDiceAction(rolls, sides) {
        rolls = Math.max(1, Number(rolls));
        sides = Math.max(2, Number(sides));
        const counts = new Array(sides).fill(0);
        for (let i = 0; i < rolls; i++) {
          const r = Math.floor(Math.random() * sides);
          counts[r]++;
        }
        return counts;
      }

      function renderDice(counts) {
        const rolls = counts.reduce((a, b) => a + b, 0);
        const previewFace =
          counts.map((c, i) => ({ i, c })).sort((a, b) => b.c - a.c)[0]?.i +
            1 || "-";
        qs("#dice-preview").innerText = previewFace;
        qs("#dice-summary").innerText = `${rolls.toLocaleString()} rolls`;

        // table
        const wrap = qs("#dice-table-wrap");
        let html =
          "<table><thead><tr><th>Face</th><th>Count</th><th>Percent</th></tr></thead><tbody>";
        counts.forEach((c, i) => {
          const pct = ((c / rolls) * 100).toFixed(2);
          html += `<tr><td> ${
            i + 1
          } </td><td> ${c} </td><td> ${pct}% </td></tr>`;
        });
        html += "</tbody></table>";
        wrap.innerHTML = html;

        // chart
        const labels = counts.map((_, i) => `Face ${i + 1}`);
        initDiceChart(labels, counts);

        qs("#live-stats").innerText = `Dice: ${rolls} rolls • ${counts
          .map((c, i) => `${i + 1}:${c}`)
          .join(", ")}`;
      }

      qs("#dice-sim").addEventListener("click", () => {
        const rolls = Number(qs("#dice-rolls").value || 100);
        const sides = Number(qs("#dice-sides").value || 6);
        qs("#dice-preview").classList.add("dice-anim");
        setTimeout(() => {
          qs("#dice-preview").classList.remove("dice-anim");
        }, 700);
        const counts = rollDiceAction(rolls, sides);
        renderDice(counts);
      });

      qs("#dice-random").addEventListener("click", () => {
        qs("#dice-rolls").value = 100;
        qs("#dice-sim").click();
      });

      // ---- GACHA ----
      let gachaChart = null;
      function initGachaChart(labels, data) {
        const ctx = qs("#gacha-chart");
        if (gachaChart) gachaChart.destroy();
        gachaChart = new Chart(ctx, {
          type: "pie",
          data: { labels, datasets: [{ data }] },
          options: { plugins: { legend: { position: "bottom" } } },
        });
      }

      qs("#gacha-sim").addEventListener("click", () => {
        const pulls = Number(qs("#gacha-pulls").value || 100);
        const pSSR = Math.max(0, Number(qs("#gacha-ssr").value || 0));
        const pSR = Math.max(0, Number(qs("#gacha-sr").value || 0));
        const pR = Math.max(0, Number(qs("#gacha-r").value || 0));
        const total = pSSR + pSR + pR;
        if (total <= 0) {
          alert("กรุณากำหนดอัตรา (รวมต้อง > 0)");
          return;
        }
        // normalize
        const weights = [pSSR / total, pSR / total, pR / total];
        const counts = [0, 0, 0];
        for (let i = 0; i < pulls; i++) {
          const rnd = Math.random();
          if (rnd < weights[0]) counts[0]++;
          else if (rnd < weights[0] + weights[1]) counts[1]++;
          else counts[2]++;
        }
        // render
        qs(
          "#gacha-result-list"
        ).innerHTML = `<div style="font-weight:800;">Pulls: ${pulls}</div>
        <div style="margin-top:8px">SSR: ${counts[0]} • SR: ${counts[1]} • R: ${counts[2]}</div>`;
        initGachaChart(["SSR", "SR", "R"], counts);
        qs(
          "#live-stats"
        ).innerText = `Gacha: ${pulls} pulls • SSR:${counts[0]} SR:${counts[1]} R:${counts[2]}`;
      });

      qs("#gacha-reset").addEventListener("click", () => {
        qs("#gacha-ssr").value = 5;
        qs("#gacha-sr").value = 20;
        qs("#gacha-r").value = 75;
        qs("#gacha-result-list").innerText = "ยังไม่สุ่ม";
        if (gachaChart) gachaChart.destroy();
      });

      // ---- COMBINATORICS ----
      function factorialBig(n) {
        n = BigInt(n);
        if (n < 0n) return null;
        let res = 1n;
        for (let i = 1n; i <= n; i++) res *= i;
        return res;
      }
      function nCr(n, k) {
        n = BigInt(n);
        k = BigInt(k);
        if (k > n) return 0n;
        const num = factorialBig(n);
        const den = factorialBig(k) * factorialBig(n - k);
        return num / den;
      }
      function nPr(n, k) {
        n = BigInt(n);
        k = BigInt(k);
        if (k > n) return 0n;
        let res = 1n;
        for (let i = 0n; i < k; i++) res *= n - i;
        return res;
      }

      qs("#combo-calc").addEventListener("click", () => {
        const n = Number(qs("#combo-n").value || 0);
        const k = Number(qs("#combo-k").value || 0);
        const mode = qs("#combo-mode").value;
        if (k > n) {
          qs("#combo-result").innerText = "k ต้องไม่มากกว่า n";
          qs("#combo-explain").innerText = "";
          return;
        }
        if (mode === "nCr") {
          const val = nCr(n, k);
          qs("#combo-result").innerText = val.toString();
          qs(
            "#combo-explain"
          ).innerText = `คำนวณโดยใช้สูตร n! / (k! (n-k)!) — ${n}! / (${k}! * ${
            n - k
          }!)`;
        } else {
          const val = nPr(n, k);
          qs("#combo-result").innerText = val.toString();
          qs(
            "#combo-explain"
          ).innerText = `คำนวณโดยใช้สูตร n! / (n-k)! — ${n}! / (${n - k}!)`;
        }
        qs("#live-stats").innerText = `Combo: ${mode}(${n},${k}) = ${
          qs("#combo-result").innerText
        }`;
      });

      // ---- Export / Download ----
      qs("#exportCSV").addEventListener("click", () => {
        // try to export last dice table if present
        const table = qs("#dice-table-wrap table");
        if (!table) {
          alert("ไม่มีข้อมูลให้ export ตอนนี้ (ลองสุ่มก่อน)");
          return;
        }
        let csv = "Face,Count,Percent\n";
        const rows = table.querySelectorAll("tbody tr");
        rows.forEach((r) => {
          const tds = r.querySelectorAll("td");
          csv += `${tds[0].innerText},${tds[1].innerText},${tds[2].innerText}\n`;
        });
        const blob = new Blob([csv], { type: "text/csv" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "dice-results.csv";
        a.click();
      });

      qs("#downloadHTML").addEventListener("click", () => {
        const full = "<!doctype html>\n" + document.documentElement.outerHTML;
        const blob = new Blob([full], { type: "text/html" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "probability-lab.html";
        a.click();
      });

      qs("#openGH").addEventListener("click", () => {
        alert(
          "วิธีง่ายๆ: สร้าง repo ใหม่บน GitHub -> อัปโหลดไฟล์ probability-lab.html -> Settings -> Pages -> เลือก branch main -> บันทึก แล้วลิงก์จะมาให้"
        );
      });

      // seed demo
      // run small demo to show prettiness on load
      setTimeout(() => {
        qs("#dice-rolls").value = 500;
        qs("#dice-sides").value = 6;
        qs("#dice-sim").click();
      }, 600);
    </script>
  </body>
</html>
